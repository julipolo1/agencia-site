<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico Estratégico | Raíz Hub Digital</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>

<body class="bg-black text-white">

<div class="fixed inset-0 -z-10">
  <div class="absolute inset-0 bg-black"></div>
  <div class="absolute inset-0 opacity-20"
    style="background-image: radial-gradient(circle at 20% 20%, #7c3aed, transparent 40%),
                           radial-gradient(circle at 80% 80%, #2563eb, transparent 40%);">
  </div>
</div>

<main class="max-w-2xl mx-auto px-6 py-16">

  <div class="mb-12 text-center">
    <h1 class="text-4xl font-bold mb-4">Diagnóstico Estratégico</h1>
    <p class="text-gray-400 text-lg">
      Evaluamos si tu negocio necesita más marketing o un sistema.
    </p>
  </div>

  <form id="form" class="space-y-10">

    <!-- NEGOCIO -->
    <div class="space-y-3 pb-6 border-b border-white/5">
      <label class="text-lg font-semibold">¿A qué se dedica tu negocio?</label>
      <input name="negocio" required type="text"
        class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-purple-500 outline-none">
    </div>

    <!-- OBJETIVO -->
    <div class="space-y-4 pb-6 border-b border-white/5">
      <label class="text-lg font-semibold">¿Cuál es tu principal objetivo?</label>

      <div class="grid gap-3">
        <button type="button" class="option-btn">Conseguir más clientes</button>
        <button type="button" class="option-btn">Escalar ventas</button>
        <button type="button" class="option-btn">Mejorar conversión</button>
        <button type="button" class="option-btn">Entender qué no funciona</button>
      </div>

      <input type="hidden" name="objetivo" id="objetivo" required>
    </div>

    <!-- INVERSIÓN -->
    <div class="space-y-4 pb-6 border-b border-white/5">
      <label class="text-lg font-semibold">Inversión mensual</label>

      <div class="grid gap-3">
        <button type="button" class="inversion-btn">Menos de $500.000 COP</button>
        <button type="button" class="inversion-btn">$500.001 - $1.000.000 COP</button>
        <button type="button" class="inversion-btn">$1.000.001 - $3.000.000 COP</button>
        <button type="button" class="inversion-btn">$3.000.001 - $6.000.000 COP</button>
        <button type="button" class="inversion-btn">Más de $6.000.000 COP</button>
      </div>

      <input type="hidden" name="inversion" id="inversion" required>
    </div>

    <!-- PROBLEMA -->
    <div class="space-y-3 pb-6 border-b border-white/5">
      <label class="text-lg font-semibold">¿Qué no está funcionando?</label>
      <textarea name="problema" required rows="4"
        class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-purple-500 outline-none"></textarea>
    </div>

    <!-- SISTEMA -->
    <div class="space-y-4 pb-6 border-b border-white/5">
      <label class="text-lg font-semibold">¿Tienes sistema?</label>

      <div class="grid gap-3">
        <button type="button" class="sistema-btn">No tengo claridad</button>
        <button type="button" class="sistema-btn">Acciones sueltas</button>
        <button type="button" class="sistema-btn">Tengo algo estructurado</button>
      </div>

      <input type="hidden" name="estructura" id="estructura" required>
    </div>

    <!-- EMAIL -->
    <div class="space-y-3">
      <label class="text-lg font-semibold">Correo</label>
      <input name="email" required type="email"
        class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-purple-500 outline-none">
    </div>

    <!-- BOTÓN -->
    <button type="submit"
      class="w-full mt-6 bg-gradient-to-r from-purple-600 to-indigo-600 py-4 rounded-xl font-semibold text-lg">
      Enviar diagnóstico →
    </button>

  </form>

  <div id="resultado" class="hidden text-center mt-12">
    <h2 class="text-2xl font-bold mb-4">Diagnóstico enviado</h2>
    <p class="text-gray-400">Revisaremos tu caso y te contactaremos.</p>
  </div>

</main>

<script>
(function(){
  emailjs.init("SenRAhyy-pRrsu5K-");
})();

// estilos base botones
function setupButtons(selector, inputId){
  const buttons = document.querySelectorAll(selector);
  const input = document.getElementById(inputId);

  buttons.forEach(btn => {
    btn.className += " w-full text-left p-4 rounded-xl bg-white/5 border border-white/10 hover:border-purple-500 hover:bg-white/10 transition text-gray-300";

    btn.addEventListener("click", () => {
      buttons.forEach(b => b.classList.remove("bg-purple-600", "text-white"));
      btn.classList.add("bg-purple-600", "text-white");
      input.value = btn.innerText;
    });
  });
}

setupButtons(".option-btn", "objetivo");
setupButtons(".inversion-btn", "inversion");
setupButtons(".sistema-btn", "estructura");

// submit
const form = document.getElementById("form");
const resultado = document.getElementById("resultado");

form.addEventListener("submit", function(e){
  e.preventDefault();

  if(!document.getElementById("objetivo").value ||
     !document.getElementById("inversion").value ||
     !document.getElementById("estructura").value){
    alert("Completa todas las selecciones");
    return;
  }

  emailjs.sendForm("service_dmwl5ok", "template_dpfmufi", this)
    .then(() => {
      form.style.display = "none";
      resultado.classList.remove("hidden");
    }, (error) => {
      alert("Error enviando");
      console.log(error);
    });
});
</script>

</body>
</html>

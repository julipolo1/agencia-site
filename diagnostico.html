<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico Estratégico | Raíz Hub Digital</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- BACKGROUND -->
<div class="fixed inset-0 -z-10">
  <div class="absolute inset-0 bg-black"></div>
  <div class="absolute inset-0 opacity-20"
    style="background-image: radial-gradient(circle at 20% 20%, #7c3aed, transparent 40%),
                           radial-gradient(circle at 80% 80%, #2563eb, transparent 40%);">
  </div>
</div>

<main class="max-w-3xl mx-auto px-6 py-20">

  <!-- HEADER -->
  <div class="mb-12 text-center">
    <h1 class="text-4xl font-bold mb-4">
      Diagnóstico Estratégico
    </h1>

    <p class="text-gray-400">
      Evaluamos si tu negocio necesita más marketing o un sistema.
    </p>
  </div>

  <!-- CONTEXTO -->
  <div class="bg-white/5 border border-white/10 rounded-xl p-6 mb-10 backdrop-blur">
    <p class="text-gray-300 text-sm">
      ✔ No es una llamada de ventas<br>
      ✔ No es para todos los negocios<br>
      ✔ Es una sesión estratégica
    </p>
  </div>

  <!-- FORM -->
  <form id="form" class="space-y-8">

    <div>
      <label class="block mb-2 font-semibold">¿A qué se dedica tu negocio?</label>
      <input required type="text"
        class="w-full p-3 rounded-lg bg-white/5 border border-white/10 focus:border-purple-500 outline-none">
    </div>

<div>
  <label class="block mb-4 font-semibold">
    ¿Cuál es tu principal objetivo?
  </label>

  <div class="grid gap-3">

    <button type="button" class="option-btn">Conseguir más clientes</button>
    <button type="button" class="option-btn">Escalar ventas</button>
    <button type="button" class="option-btn">Mejorar conversión</button>
    <button type="button" class="option-btn">Entender qué no funciona</button>

  </div>

  <input type="hidden" name="objetivo" id="objetivo" required>
</div>

<div>
  <label class="block mb-2 font-semibold">
    ¿Cuánto estás invirtiendo actualmente en marketing mensual?
  </label>

  <select required class="w-full p-3 rounded-lg bg-white/5 border border-white/10 focus:border-purple-500 outline-none">
    <option value="">Selecciona una opción</option>

    <option>Menos de $500.000 COP</option>
    <option>$500.001 - $1.000.000 COP</option>
    <option>$1.000.001 - $3.000.000 COP</option>
    <option>$3.000.001 - $6.000.000 COP</option>
    <option>Más de $6.000.000 COP</option>

  </select>
</div>

    <div>
      <label class="block mb-2 font-semibold">¿Qué no está funcionando?</label>
      <textarea required
        class="w-full p-3 rounded-lg bg-white/5 border border-white/10"></textarea>
    </div>

    <div>
      <label class="block mb-2 font-semibold">¿Tienes sistema o acciones sueltas?</label>
      <select required class="w-full p-3 rounded-lg bg-white/5 border border-white/10">
        <option value="">Selecciona</option>
        <option>No tengo claridad</option>
        <option>Acciones sueltas</option>
        <option>Tengo algo estructurado</option>
      </select>
    </div>

    <div>
      <label class="block mb-2 font-semibold">Correo</label>
      <input required type="email"
        class="w-full p-3 rounded-lg bg-white/5 border border-white/10">
    </div>

    <button type="submit"
      class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 py-4 rounded-xl font-semibold text-lg hover:scale-105 transition shadow-lg">
      Continuar →
    </button>

  </form>

  <!-- RESULTADO -->
  <div id="resultado" class="hidden text-center mt-12">

    <h2 class="text-2xl font-bold mb-4">
      Tu caso puede ser evaluado
    </h2>

    <p class="text-gray-400 mb-6">
      Agenda una sesión para revisar tu sistema en detalle.
    </p>

    <a href="https://calendly.com/raizhubdigital/30min"
       target="_blank"
       class="inline-block px-8 py-4 rounded-xl font-semibold border border-white/10 hover:border-purple-500 transition backdrop-blur bg-white/5">
       Agendar sesión →
    </a>

  </div>

</main>

<script>
const form = document.getElementById("form");
const resultado = document.getElementById("resultado");

form.addEventListener("submit", function(e){
  e.preventDefault();
  form.style.display = "none";
  resultado.classList.remove("hidden");
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
});
</script>

</body>
</html>
